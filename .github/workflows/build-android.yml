name: Build Android

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  QT_MIRROR: https://mirrors.ocf.berkeley.edu/qt/
  ANDROID_PLATFORM: android-28
  NDK_VERSION: 27.0.11718014
  QT_VERSION: 6.8.3
  QT_MODULES: 'qtremoteobjects qt5compat qtshadertools'

jobs:
  Build-Android:
    runs-on: ubuntu-latest

    steps:
    - name: Get sources
      uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 10

    - name: Install desktop Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        modules: ${{ env.QT_MODULES }}
        dir: ${{ runner.temp }}
        aqtversion: '==3.3.0'
        extra: '--base ${{ env.QT_MIRROR }}'

    - name: Install android Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: ${{ env.QT_MODULES }}
        dir: ${{ runner.temp }}
        aqtversion: '==3.3.0'
        extra: '--base ${{ env.QT_MIRROR }}'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        packages: "platforms;${{ env.ANDROID_PLATFORM }} ndk;${{ env.NDK_VERSION }}"

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14

    - name: Install conan
      run: pip install "conan==2.28.0"

    - name: Export local recipes
      run: |
        for recipe in $(find recipes -name conanfile.py); do
          dir=$(dirname "$recipe")
          conan export "$dir"
        done

    - name: Remove private Conan remote
      run: conan remote remove Rampage 2>/dev/null; conan remote list

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/android_arm64_v8a" \
          -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }} \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a

    - name: Build
      run: cmake --build build --parallel

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: RampageVPN_Android_arm64-v8a
        path: build/client/android-build/RampageVPN.apk
        retention-days: 7
