name: Build Windows

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  QT_MIRROR: https://mirrors.ocf.berkeley.edu/qt/

jobs:
  Build-Windows:
    runs-on: windows-latest

    steps:
    - name: Get sources
      uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 10

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: 6.8.3
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qtremoteobjects qt5compat qtshadertools'
        dir: ${{ runner.temp }}
        setup-python: 'true'
        set-env: 'true'
        aqtversion: '==3.3.0'
        extra: '--base ${{ env.QT_MIRROR }}'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: 'x64'

    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14

    - name: Install conan
      run: pip install "conan==2.28.0"

    - name: Configure CMake
      shell: cmd
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      shell: cmd
      run: cmake --build build --config Release --parallel

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: RampageVPN_Windows_x64
        path: build/client/Release/RampageVPN.exe
        retention-days: 7
